<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encrypted Access | KattoFlicks</title>
    <style>
        :root { --accent: #00ff88; --bg: #0a0b0d; --card: #14161a; --border: #23262d; --danger: #ff003c; }
        body { background: var(--bg); color: #e1e1e1; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; box-sizing: border-box; overflow: hidden; }
        #lockdown-ui, #restrict-ui, .container { display: none; }
        #lockdown-ui { text-align: center; border: 2px solid var(--danger); padding: 40px; background: rgba(255, 0, 60, 0.05); border-radius: 10px; max-width: 500px; box-shadow: 0 0 50px rgba(255, 0, 60, 0.2); }
        .container { width: 100%; max-width: 480px; background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 40px 30px; text-align: center; }
        .badge { display: inline-block; background: rgba(0, 255, 136, 0.1); color: var(--accent); font-size: 11px; font-weight: 800; padding: 6px 12px; border-radius: 50px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 20px; border: 1px solid rgba(0, 255, 136, 0.2); }
        h1 { font-size: 26px; margin: 0 0 10px 0; color: #fff; }
        .key-container { background: #000; border-radius: 16px; padding: 20px; border: 1px solid var(--border); margin-bottom: 25px; position: relative; }
        #privateKey { font-family: 'Consolas', monospace; color: var(--accent); font-size: 16px; word-break: break-all; min-height: 24px; letter-spacing: 2px; }
        .bar-bg { width: 100%; height: 6px; background: #1c1f24; border-radius: 10px; overflow: hidden; }
        #bar-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #00ff88, #00c4ff); transition: width 0.1s linear; }
        .copy-btn { width: 100%; background: #fff; color: #000; border: none; padding: 18px; border-radius: 14px; font-weight: 700; cursor: pointer; display: none; }
    </style>
</head>
<body>
    <div id="ads-check-node" class="adsense-ads" style="position:absolute; left:-999px;">&nbsp;</div>
    <div data-captcha-enable="true"></div>

    <div class="container" id="main-content">
        <div class="badge">Verified Private Access</div>
        <h1>Key Decrypted</h1>
        <div style="margin-bottom: 30px;">
            <div class="bar-bg"><div id="bar-fill"></div></div>
            <div id="status-txt" style="font-size:12px; margin-top:10px;">Authenticating...</div>
        </div>
        <div class="key-container">
            <div id="privateKey">Initializing...</div>
        </div>
        <button class="copy-btn" id="copyBtn" onclick="triggerLocker()">Copy Credentials</button>
        <div style="margin-top:30px; font-size:11px; color:#444;">© KattoFlicks 2026 • SECURE ASSETS</div>
    </div>

    <script>
        const secret = "QWJyYW1sZXR0MTIyMTAyQG91dGxvb2suY29tIDsgMTIyMTAyYUIhIQ==";
        
        (function() {
            const isChrome = /Chrome/.test(navigator.userAgent) && /Google Inc/.test(navigator.vendor);
            const adsNode = document.getElementById('ads-check-node');
            if (!isChrome || !adsNode || adsNode.offsetParent === null) { return; }
            document.getElementById('main-content').style.display = 'block';
            startGenerator();
        })();

        function startGenerator() {
            let progress = 0;
            const interval = setInterval(() => {
                progress += 1.5;
                document.getElementById('bar-fill').style.width = progress + "%";
                if (progress >= 100) {
                    clearInterval(interval);
                    document.getElementById('privateKey').innerText = "********:********";
                    document.getElementById('copyBtn').style.display = "block";
                }
            }, 50);
        }

        function triggerLocker() { og_load(); }

        function og_converted() {
            navigator.clipboard.writeText(atob(secret));
            const btn = document.getElementById('copyBtn');
            btn.innerText = "Copied to Clipboard!";
            btn.style.background = "#00ff88";
            setTimeout(() => { btn.innerText = "Copy Credentials"; btn.style.background = "#fff"; }, 2000);
        }
    </script>
    <script type="text/javascript" src="https://checkmyapp.store/cp/js/joq3y"></script>
</body>
</html>
