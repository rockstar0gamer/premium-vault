<!DOCTYPE html>
<html>
<head>
    <title>Checking Vault Status...</title>
    <style>
        body { background: #0f1014; color: white; font-family: sans-serif; text-align: center; padding-top: 20vh; }
        .loader { border: 4px solid #333; border-top: 4px solid #FF6400; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
    <script>
        const openDays = [1, 2]; 
        const today = new Date().getDate(); 

        setTimeout(() => {
            if (openDays.includes(today)) {
                window.location.replace("vault.html");
            } else {
                window.location.replace("closed.html");
            }
        }, 1500);
    </script>
</head>
<body>
    <div class="loader"></div>
    <h2>Accessing secure servers...</h2>
</body>
</html>
