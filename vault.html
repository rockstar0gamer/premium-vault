<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Access Vault</title>
    <style>
        :root { --main-orange: #FF6400; --dark-bg: #0f1014; --card-bg: #1a1c22; }
        body { background-color: var(--dark-bg); color: #fff; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .dashboard { max-width: 900px; width: 100%; }
        
        /* Updated header to hold the button */
        .header { border-bottom: 2px solid var(--main-orange); margin-bottom: 30px; padding-bottom: 15px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .header-text h1 { margin: 0; font-size: 24px; letter-spacing: 1px; }
        .header-text span { color: var(--main-orange); }
        .header-text p { opacity: 0.6; margin-top: 5px; margin-bottom: 0; font-size: 14px; }
        
        /* New YouTube Button Style */
        .yt-btn { background: #ff0000; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; font-weight: bold; font-size: 14px; transition: 0.3s; display: inline-block; letter-spacing: 0.5px; }
        .yt-btn:hover { background: #cc0000; box-shadow: 0 0 15px rgba(255, 0, 0, 0.4); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; }
        .card { background: var(--card-bg); border-radius: 10px; padding: 15px; border: 1px solid #2d2f36; }
        .acc-info { font-family: monospace; background: #000; padding: 10px; margin-top: 10px; border-radius: 5px; color: #00ff88; letter-spacing: 0.5px; }
        .copy-btn { width: 100%; background: #333; border: none; color: white; padding: 12px; margin-top: 15px; border-radius: 5px; cursor: pointer; font-weight: bold; letter-spacing: 1px; }
        .copy-btn:hover { background: var(--main-orange); }
    </style>
</head>
<body>
<div class="dashboard">
    <div class="header">
        <div class="header-text">
            <h1>PREMIUM<span>VAULT</span></h1>
            <p>Direct Access Keys • Do Not Change Passwords</p>
        </div>
        <a href="https://youtube.com/YOUR_CHANNEL" class="yt-btn" target="_blank">📺 SUBSCRIBE</a>
    </div>
    <div class="grid">
        <div class="card">
            <h3 style="margin:0 0 10px 0; color:var(--main-orange);">Server 01</h3>
            <div class="acc-info" id="acc1">user123:password99</div>
            <button class="copy-btn" onclick="copyText('acc1', this)">COPY KEY</button>
        </div>
        <div class="card">
            <h3 style="margin:0 0 10px 0; color:var(--main-orange);">Server 02</h3>
            <div class="acc-info" id="acc2">animefan:stream2026</div>
            <button class="copy-btn" onclick="copyText('acc2', this)">COPY KEY</button>
        </div>
    </div>
</div>
<script>
    function copyText(id, btn) {
        navigator.clipboard.writeText(document.getElementById(id).innerText);
        const oldText = btn.innerText;
        btn.innerText = "COPIED!"; btn.style.background = "#00ff88"; btn.style.color = "#000";
        setTimeout(() => { btn.innerText = oldText; btn.style.background = "#333"; btn.style.color = "#fff"; }, 2000);
    }
</script>
</body>
</html>
