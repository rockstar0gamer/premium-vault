<!DOCTYPE html>
<html lang="en">
<head>

        .box { max-width: 500px; margin: auto; background: #1a1c22; padding: 30px; border-radius: 15px; border: 1px solid #333; }
        h1 { color: #FF6400; }
        .btn-yt { display: inline-block; background: #FF0000; color: white; padding: 15px 25px; text-decoration: none; border-radius: 5px; font-weight: bold; margin-top: 15px; width: 80%; }
        .btn-cpa { display: inline-block; background: #00ff88; color: black; padding: 15px 20px; text-decoration: none; border-radius: 5px; font-weight: bold; margin-top: 25px; width: 80%; cursor: pointer;}
    </style>
</head>
<body>
    <div class="box">
        <h1>VAULT IS RESTOCKING</h1>
        <p>All public accounts for this drop have been claimed.</p>
        <a href="https://youtube.com/@kattoflicks?si=DsGDfEHk6w1zw4yL" class="btn-yt" target="_blank">SUBSCRIBE ON YOUTUBE</a>

        <a href="#" onclick="openSecureVault(event)" class="btn-cpa">UNLOCK PRIVATE KEY NOW</a>

    <script>
        function openSecureVault(e) {
            e.preventDefault();
            const token = Math.random().toString(36).substring(2, 15);

            window.location.href = "private/?session=" + token + "&auth=" + btoa(token);
