<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Dashboard</title>
    <style>
        :root { --accent: #FF6400; --bg: #0a0b0d; --card: #14161a; --border: #23262d; --green: #00ff88; }
        body { background: var(--bg); color: #e1e1e1; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .wrapper { max-width: 1000px; margin: 0 auto; }
        .header { text-align: center; padding: 40px 0; border-bottom: 1px solid var(--border); margin-bottom: 40px; }
        .badge { display: inline-block; background: rgba(255, 100, 0, 0.1); color: var(--accent); font-size: 11px; font-weight: 800; padding: 6px 12px; border-radius: 50px; text-transform: uppercase; border: 1px solid rgba(255, 100, 0, 0.2); margin-bottom: 15px; }
        h1 { font-size: 32px; margin: 0; color: #fff; letter-spacing: 2px; }
        h1 span { color: var(--accent); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .card { background: var(--card-bg); border-radius: 20px; padding: 25px; border: 1px solid var(--border); }
        .acc-info { background: #000; padding: 15px; border-radius: 12px; font-family: monospace; color: var(--green); font-size: 14px; text-align: center; word-break: break-all; margin: 15px 0; border: 1px solid #1c1f24; }
        .copy-btn { width: 100%; background: #fff; color: #000; border: none; padding: 12px; border-radius: 10px; font-weight: 700; cursor: pointer; }
        .footer-box { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 50px 20px; text-align: center; margin-top: 60px; }
        .btn-yt { display: inline-block; background: #FF0000; color: white; padding: 16px 40px; text-decoration: none; border-radius: 14px; font-weight: bold; }
    </style>
</head>
<body>
<div class="wrapper" id="secure-wrapper">
    <div class="header">
        <div class="badge">Live Server Status: Online</div>
        <h1>PREMIUM<span>VAULT</span></h1>
        <p style="color:#666; font-size: 14px;">Direct Access Credentials • Global Node Access</p>
    </div>
    <div class="grid" id="main-grid"></div>
    <div class="footer-box">
        <h2 style="color:#fff;">Next Drop Notification</h2>
        <a href="https://youtube.com/@kattoflicks?si=DsGDfEHk6w1zw4yL" class="btn-yt" target="_blank">SUBSCRIBE TO CHANNEL</a>
        <p style="font-size: 11px; opacity: 0.3; margin-top: 30px;">© KattoFlicks • SECURE ASSETS</p>
    </div>
</div>

<script>
    (function() {
        // 1. ENVIRONMENT LOCK (Stops local file opening)
        const officialDomain = "rockstar0gamer.github.io";
        if (window.location.hostname !== officialDomain) {
            document.body.innerHTML = "<div style='color:white;text-align:center;padding-top:40vh;font-family:sans-serif;'><h1>SECURITY ALERT</h1><p>This file cannot be viewed locally. Please visit the official site.</p></div>";
            return; // Stops the rest of the script from ever loading
        }

        // 2. TIME LOCK
        const authorizedDays = [1, 2, 3]; 
        const currentDay = new Date().getDate();
        if (!authorizedDays.includes(currentDay)) {
            window.location.replace("closed.html");
            return;
        }

        // 3. ENCODED DATA (Base64)
        const encodedData = ["anVhbm5ldmVzbTIwQGdtYWlsLmNvbTptYXRhMDUxMg==", "amVob3ZhaHBlZHJvMDRAZ21haWwuY29tOkpwMDQwNTA1", "bWFuZGkuc2F4Ynk1MTEzQGdtYWlsLmNvbTpNM2RsMGNrTTUxMTM=", "Ym9uaW5pbWF1cm8zMUBnbWFpbC5jb206TWIyMDIwKio=", "bm9lbWkuYWx2ZXNAaWNsb3VkLmNvbTphbHZlc25vZW1pOTg=", "ZHQ1NzMzOTJAZ21haWwuY29tOmxVQ2ExOSNi", "Ymw0ejRwbGg0QGdtYWlsLmNvbTptdWxpdGExMg==", "cmFmYXN6OTk5OTk5QGdtYWlsLmNvbTpSYWZ hZWwxMjM=", "Z2F0b3NhbmRpYTExMUB5YW5kZXguY29tOmVnczEyMw==", "a291aHlzdWdvZUBnbWFpbC5jb206a2VsdmVuMTIzMzIx", "emlvbi5mb3dsZXIxQGljbG91ZC5jb206aGV5aGV5aGV5WTE=", "cmh1YW5icmFuY29jQGdtYWlsLmNvbTpyaHVhbjAxMDU=", "a2FzZW1jYWRhbXMyOEBnbWFpbC5jb206NTgwMjM5MTEyM0tt"];

        // 4. GENERATE CONTENT
        const grid = document.getElementById('main-grid');
        encodedData.forEach((enc, i) => {
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `<h3>Server Node ${String(i+1).padStart(2, '0')}</h3><div class="acc-info" id="acc${i}">${atob(enc)}</div><button class="copy-btn" onclick="copyIt('acc${i}', this)">Copy Key</button>`;
            grid.appendChild(div);
        });
    })();

    function copyIt(id, b) {
        navigator.clipboard.writeText(document.getElementById(id).innerText);
        b.innerText = "Copied!"; b.style.background = "#00ff88";
        setTimeout(() => { b.innerText = "Copy Key"; b.style.background = "#fff"; }, 2000);
    }
</script>
</body>
</html>
