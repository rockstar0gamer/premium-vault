<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Access Granted</title>
    <style>
        :root { --main-green: #00ff88; --dark-bg: #0f1014; }
        body { background-color: var(--dark-bg); color: #fff; font-family: 'Courier New', Courier, monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; text-align: center; }
        
        .box { max-width: 500px; width: 100%; background: #1a1c22; padding: 40px; border-radius: 20px; border: 2px solid var(--main-green); box-shadow: 0 0 30px rgba(0, 255, 136, 0.1); position: relative; overflow: hidden; }
        
        h1 { color: var(--main-green); margin-bottom: 5px; font-size: 22px; text-transform: uppercase; }
        #status-text { font-size: 14px; color: var(--main-green); opacity: 0.8; margin-bottom: 20px; height: 20px; }

        .key-display { background: #000; padding: 25px; border-radius: 10px; font-size: 18px; color: var(--main-green); margin: 20px 0; border: 1px solid rgba(0, 255, 136, 0.3); min-height: 30px; }
        
        .progress-bar { width: 100%; height: 4px; background: #333; margin-bottom: 20px; border-radius: 2px; }
        #progress-fill { width: 0%; height: 100%; background: var(--main-green); transition: width 0.1s linear; }

        .copy-btn { width: 100%; background: var(--main-green); color: #000; border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; display: none; text-transform: uppercase; letter-spacing: 1px; }
        
        /* Matrix-like glow */
        .glow { text-shadow: 0 0 8px var(--main-green); }
    </style>
</head>
<body>

    <div class="box">
        <h1>ACCESS GRANTED</h1>
        <div id="status-text">Initializing connection...</div>
        
        <div class="progress-bar"><div id="progress-fill"></div></div>

        <div class="key-display glow" id="privateKey">--------:--------</div>

        <button class="copy-btn" id="copyBtn" onclick="copyPrivate()">COPY UNIQUE KEY</button>
        <p id="footer-text" style="font-size: 11px; margin-top: 20px; opacity: 0.4;">AUTHENTICATED SESSION: #4920-X</p>
    </div>

    <script>
        // THE REAL ACCOUNT DATA
        const finalAccount = "premium_user_gold:Secret99"; 
        
        const keyDisplay = document.getElementById('privateKey');
        const statusText = document.getElementById('status-text');
        const progressFill = document.getElementById('progress-fill');
        const copyBtn = document.getElementById('copyBtn');
        const chars = "ABCDEF0123456789!@#$%&*";

        let progress = 0;
        const duration = 3000; // 3 seconds total
        
        // 1. Start the animation
        const interval = setInterval(() => {
            progress += 2;
            progressFill.style.width = progress + "%";
            
            // Random character "shuffling" effect
            let randomText = "";
            for(let i=0; i<finalAccount.length; i++) {
                randomText += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            keyDisplay.innerText = randomText;

            // Status updates
            if (progress < 30) statusText.innerText = "Analyzing device...";
            else if (progress < 60) statusText.innerText = "Bypassing protocols...";
            else if (progress < 90) statusText.innerText = "Generating unique key...";
            else statusText.innerText = "Authentication Complete!";

            // 2. Finish the animation
            if (progress >= 100) {
                clearInterval(interval);
                keyDisplay.innerText = finalAccount; // Reveal real account
                copyBtn.style.display = "block"; // Show copy button
                progressFill.style.background = "#00ff88";
            }
        }, 60);

        function copyPrivate() {
            navigator.clipboard.writeText(keyDisplay.innerText);
            const originalText = copyBtn.innerText;
            copyBtn.innerText = "COPIED TO CLIPBOARD!";
            copyBtn.style.background = "#fff";
            setTimeout(() => {
                copyBtn.innerText = originalText;
                copyBtn.style.background = "#00ff88";
            }, 2000);
        }
    </script>
</body>
</html>
