<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restocking Vault</title>
    <style>
        :root { --accent: #FF6400; --bg: #0a0b0d; --card: #14161a; --border: #23262d; --green: #00ff88; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .container { width: 100%; max-width: 480px; background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 50px 30px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .badge { display: inline-block; background: rgba(255, 100, 0, 0.1); color: var(--accent); font-size: 11px; font-weight: 800; padding: 6px 12px; border-radius: 50px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 25px; border: 1px solid rgba(255, 100, 0, 0.2); }
        h1 { font-size: 26px; margin: 0 0 15px 0; font-weight: 700; }
        p { color: #888; font-size: 15px; line-height: 1.6; margin-bottom: 35px; }
        .btn-yt { display: block; background: #FF0000; color: #fff; text-decoration: none; padding: 18px; border-radius: 14px; font-weight: 700; margin-bottom: 15px; transition: 0.3s; }
        .btn-unlock { display: block; background: var(--green); color: #000; text-decoration: none; padding: 18px; border-radius: 14px; font-weight: 700; transition: 0.3s; }
        .divider { height: 1px; background: var(--border); margin: 30px 0; }
        .sub-txt { font-size: 13px; color: var(--accent); font-weight: 600; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="badge">Supply Depleted</div>
        <h1>Vault is Restocking</h1>
        <p>All current public assets have been distributed. Our next drop is currently being synchronized.</p>
        
        <a href="https://youtube.com/@kattoflicks?si=DsGDfEHk6w1zw4yL" class="btn-yt" target="_blank">SUBSCRIBE ON YOUTUBE</a>
        
        <div class="divider"></div>
        
        <div class="sub-txt">Need Instant Access?</div>
        <a href="#" onclick="openSecureVault(event)" class="btn-unlock">UNLOCK PRIVATE KEY NOW</a>
    </div>
    <script>
        function openSecureVault(e) {
            e.preventDefault();
            const token = Math.random().toString(36).substring(2, 12);
            window.location.href = "private/?session=" + token + "&auth=" + btoa(token);
        }
    </script>
</body>
</html>
