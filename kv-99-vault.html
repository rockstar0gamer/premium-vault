<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Access Granted</title>
    <style>
        :root { --main-green: #00ff88; --dark-bg: #0f1014; }
        body { background-color: var(--dark-bg); color: #fff; font-family: monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .box { max-width: 500px; width: 100%; background: #1a1c22; padding: 40px; border-radius: 20px; border: 2px solid var(--main-green); text-align: center; }
        .key-display { background: #000; padding: 25px; border-radius: 10px; font-size: 18px; color: var(--main-green); margin: 20px 0; border: 1px solid rgba(0, 255, 136, 0.3); }
        .copy-btn { width: 100%; background: var(--main-green); color: #000; border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; display: none; }
    </style>
</head>
<body>
    <div class="box">
        <h1 style="color:var(--main-green);">ACCESS GRANTED</h1>
        <div id="status">Initializing...</div>
        <div class="key-display" id="privateKey">--------:--------</div>
        <button class="copy-btn" id="copyBtn" onclick="copyPrivate()">COPY UNIQUE KEY</button>
    </div>

    <script>
    // SECURITY CHECK: If no random token is found, send them back to the start
    const urlParams = new URLSearchParams(window.location.search);
    if (!urlParams.has('token')) {
        window.location.replace("index.html");
    }

    // YOUR EXISTING OBFUSCATED DATA
    const secret = "cHJlbWl1bV91c2VyX2dvbGQ6U2VjcmV0OTk="; 
    
    // ... rest of your existing animation code ...
</script>

    <script>
        const secret = "cHJlbWl1bV91c2VyX2dvbGQ6U2VjcmV0OTk="; // "premium_user_gold:Secret99"
        const keyDisplay = document.getElementById('privateKey');
        const statusText = document.getElementById('status');
        const copyBtn = document.getElementById('copyBtn');

        let progress = 0;
        const interval = setInterval(() => {
            progress += 5;
            keyDisplay.innerText = Math.random().toString(36).substring(7);
            if (progress >= 100) {
                clearInterval(interval);
                keyDisplay.innerText = atob(secret); // DECODES HERE
                statusText.innerText = "AUTHENTICATED";
                copyBtn.style.display = "block";
            }
        }, 100);

        function copyPrivate() {
            navigator.clipboard.writeText(keyDisplay.innerText);
            copyBtn.innerText = "COPIED!";
            setTimeout(() => { copyBtn.innerText = "COPY UNIQUE KEY"; }, 2000);
        }
    </script>
</body>
</html>
