<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Access Vault</title>
    <style>
        :root { --main-orange: #FF6400; --dark-bg: #0f1014; --card-bg: #1a1c22; --main-green: #00ff88; }
        body { background-color: var(--dark-bg); color: #fff; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .dashboard { max-width: 900px; width: 100%; }
        
        /* Header Styling */
        .header { border-bottom: 2px solid var(--main-orange); margin-bottom: 30px; padding-bottom: 15px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .header-text h1 { margin: 0; font-size: 24px; letter-spacing: 1px; }
        .header-text span { color: var(--main-orange); }
        .header-text p { opacity: 0.6; margin-top: 5px; margin-bottom: 0; font-size: 14px; }
        
        /* YouTube Button */
        .btn-yt { background: #FF0000; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; font-weight: bold; font-size: 14px; transition: 0.3s; box-shadow: 0 4px 10px rgba(255, 0, 0, 0.2); }
        .btn-yt:hover { background: #cc0000; transform: translateY(-2px); }

        /* Grid & Cards */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .card { background: var(--card-bg); border-radius: 12px; padding: 20px; border: 1px solid #333; transition: 0.3s; }
        .card:hover { border-color: var(--main-orange); box-shadow: 0 0 15px rgba(255, 100, 0, 0.1); }
        .acc-info { font-family: monospace; background: #000; padding: 12px; margin-top: 10px; border-radius: 6px; color: var(--main-green); text-align: center; font-size: 15px; }
        
        .copy-btn { width: 100%; background: #333; border: none; color: white; padding: 12px; margin-top: 15px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .copy-btn:hover { background: var(--main-orange); }

        /* Fancy Bottom Section (Matches closed.html) */
        .footer-box { background: var(--card-bg); padding: 30px; border-radius: 15px; border: 1px solid #333; text-align: center; margin-top: 20px; }
        .footer-box hr { border: 0; border-top: 1px solid #333; margin: 25px 0; }
        .footer-box p { font-size: 15px; margin-bottom: 15px; }
        
        .btn-cpa { display: inline-block; background: var(--main-green); color: black; padding: 12px 25px; text-decoration: none; border-radius: 6px; font-weight: bold; transition: 0.3s; box-shadow: 0 4px 15px rgba(0, 255, 136, 0.2); }
        .btn-cpa:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(0, 255, 136, 0.4); }

        .copyright { font-size: 12px; opacity: 0.4; margin-top: 30px; letter-spacing: 1px; }
    </style>
</head>
<body>
<div class="dashboard">
    <div class="header">
        <div class="header-text">
            <h1>PREMIUM<span>VAULT</span></h1>
            <p>Direct Access Keys • Do Not Change Passwords</p>
        </div>
        <a href="https://youtube.com/@kattoflicks?si=DsGDfEHk6w1zw4yL" class="btn-yt" target="_blank">📺 SUBSCRIBE</a>
    </div>

    <div class="grid">
        <div class="card">
            <h3 style="margin:0 0 10px 0; color:var(--main-orange);">Server 01</h3>
            <div class="acc-info" id="acc1">user123:password99</div>
            <button class="copy-btn" onclick="copyText('acc1', this)">COPY KEY</button>
        </div>
        <div class="card">
            <h3 style="margin:0 0 10px 0; color:var(--main-orange);">Server 02</h3>
            <div class="acc-info" id="acc2">animefan:stream2026</div>
            <button class="copy-btn" onclick="copyText('acc2', this)">COPY KEY</button>
        </div>
    </div>

    <div class="footer-box">
        <p style="color: var(--main-orange); font-weight: bold;">Want a Private Account?</p>
        <p style="opacity: 0.8; font-size: 14px;">If the public keys are full, you can unlock a unique private key instantly.</p>
        <a href="PASTE_YOUR_OGADS_LOCKER_LINK_HERE" class="btn-cpa">GET PRIVATE KEY</a>
        
        <hr>
        
        <div class="copyright">© 2026 KattoFlicks • ALL RIGHTS RESERVED</div>
    </div>
</div>

<script>
    function copyText(id, btn) {
        navigator.clipboard.writeText(document.getElementById(id).innerText);
        const oldText = btn.innerText;
        btn.innerText = "COPIED!"; btn.style.background = "#00ff88"; btn.style.color = "#000";
        setTimeout(() => { btn.innerText = oldText; btn.style.background = "#333"; btn.style.color = "#fff"; }, 2000);
    }
</script>
</body>
</html>
