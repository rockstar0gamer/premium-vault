<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Access Granted</title>
    <style>
        :root { --main-green: #00ff88; --dark-bg: #0f1014; }
        body { background-color: var(--dark-bg); color: #fff; font-family: 'Courier New', Courier, monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; text-align: center; }
        .box { max-width: 500px; width: 100%; background: #1a1c22; padding: 40px; border-radius: 20px; border: 2px solid var(--main-green); box-shadow: 0 0 30px rgba(0, 255, 136, 0.1); position: relative; }
        h1 { color: var(--main-green); margin-bottom: 5px; font-size: 22px; text-transform: uppercase; letter-spacing: 2px; }
        #console-log { font-size: 12px; color: var(--main-green); opacity: 0.7; height: 50px; margin-bottom: 10px; overflow: hidden; text-align: left; background: #000; padding: 10px; border-radius: 5px; border: 1px solid #333; }
        .key-display { background: #000; padding: 25px; border-radius: 10px; font-size: 18px; color: var(--main-green); margin: 20px 0; border: 1px solid rgba(0, 255, 136, 0.3); min-height: 30px; letter-spacing: 1px; }
        .progress-bar { width: 100%; height: 4px; background: #333; margin-bottom: 20px; border-radius: 2px; }
        #progress-fill { width: 0%; height: 100%; background: var(--main-green); box-shadow: 0 0 10px var(--main-green); }
        .copy-btn { width: 100%; background: var(--main-green); color: #000; border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; display: none; text-transform: uppercase; }
        .session-info { font-size: 10px; opacity: 0.4; margin-bottom: 15px; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="box">
        <div class="session-info" id="sessionID">SESSION: LOADING...</div>
        <h1>ACCESS GRANTED</h1>
        
        <div id="console-log"></div>
        <div class="progress-bar"><div id="progress-fill"></div></div>
        <div class="key-display" id="privateKey">--------:--------</div>

        <button class="copy-btn" id="copyBtn" onclick="copyPrivate()">COPY UNIQUE KEY</button>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        if (!urlParams.has('session')) { window.location.replace("../index.html"); }

        // Set a random Session ID for the user
        document.getElementById('sessionID').innerText = "SESSION ID: " + Math.random().toString(36).toUpperCase().substring(2, 12);

        const secret = "cHJlbWl1bV91c2VyX2dvbGQ6U2VjcmV0OTk="; 
        const logMessages = [
            "> Establishing secure tunnel...",
            "> Bypassing firewall...",
            "> Requesting unique token...",
            "> Handshake successful.",
            "> Decrypting AES-256 payload...",
            "> Finalizing secure access..."
        ];

        const keyDisplay = document.getElementById('privateKey');
        const consoleLog = document.getElementById('console-log');
        const progressFill = document.getElementById('progress-fill');
        const copyBtn = document.getElementById('copyBtn');
        const chars = "0123456789ABCDEF!@#$%&*";

        let progress = 0;
        let messageIndex = 0;

        const interval = setInterval(() => {
            progress += 2;
            progressFill.style.width = progress + "%";
            
            // Random character shuffling
            let randomText = "";
            for(let i=0; i<15; i++) {
                randomText += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            keyDisplay.innerText = randomText;

            // Update Console Logs
            if (progress % 18 === 0 && messageIndex < logMessages.length) {
                const p = document.createElement('div');
                p.innerText = logMessages[messageIndex];
                consoleLog.appendChild(p);
                consoleLog.scrollTop = consoleLog.scrollHeight;
                messageIndex++;
            }

            if (progress >= 100) {
                clearInterval(interval);
                keyDisplay.innerText = atob(secret);
                keyDisplay.style.textShadow = "0 0 15px #00ff88";
                copyBtn.style.display = "block";
            }
        }, 70);

        function copyPrivate() {
            navigator.clipboard.writeText(keyDisplay.innerText);
            copyBtn.innerText = "COPIED TO CLIPBOARD!";
            setTimeout(() => { copyBtn.innerText = "COPY UNIQUE KEY"; }, 2000);
        }
    </script>
</body>
</html>
