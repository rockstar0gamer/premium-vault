<!DOCTYPE html>
<html>
<head>
    <title>Establishing Connection...</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --accent: #00ff88; --bg: #0a0b0d; --card: #14161a; --border: #23262d; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { width: 90%; max-width: 400px; background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 40px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .loader { border: 3px solid rgba(0, 255, 136, 0.1); border-top: 3px solid var(--accent); border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 0 auto 25px auto; box-shadow: 0 0 15px rgba(0, 255, 136, 0.2); }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        h2 { font-size: 18px; letter-spacing: 1px; color: var(--accent); text-transform: uppercase; margin: 0; }
        p { font-size: 12px; color: #666; margin-top: 10px; }
    </style>
    <script>
        const openDays = [1, 2]; // Open on 1st and 2nd
        const today = new Date().getDate(); 
        setTimeout(() => {
            if (openDays.includes(today)) { window.location.replace("vault.html"); } 
            else { window.location.replace("closed.html"); }
        }, 1800);
    </script>
</head>
<body>
    <div class="container">
        <div class="loader"></div>
        <h2>Secure Access</h2>
        <p>Connecting to global proxy nodes...</p>
    </div>
</body>
</html>
