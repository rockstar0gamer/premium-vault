<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encrypted Access | KattoFlicks</title>
    <script type="text/javascript" src="https://checkmyapp.store/cl/js/joq3y"></script>
    <style>
        :root { --accent: #00ff88; --bg: #0a0b0d; --card: #14161a; --border: #23262d; --danger: #ff003c; }
        body { background: var(--bg); color: #e1e1e1; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; box-sizing: border-box; overflow: hidden; }
        #lockdown-ui { display: none; text-align: center; border: 2px solid var(--danger); padding: 40px; background: rgba(255, 0, 60, 0.05); border-radius: 10px; max-width: 500px; box-shadow: 0 0 50px rgba(255, 0, 60, 0.2); z-index: 9999; }
        .warning-icon { font-size: 60px; color: #ffcc00; margin-bottom: 20px; }
        .log-box { background: #000; padding: 15px; border-radius: 5px; text-align: left; font-size: 11px; color: #ff003c; border-left: 3px solid var(--danger); margin: 20px 0; font-family: monospace; }
        #restrict-ui { display: none; text-align: center; border: 2px solid var(--accent); padding: 40px; background: rgba(0, 255, 136, 0.05); border-radius: 10px; max-width: 500px; }
        .container { display: none; width: 100%; max-width: 480px; background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 40px 30px; text-align: center; position: relative; }
        .badge { display: inline-block; background: rgba(0, 255, 136, 0.1); color: var(--accent); font-size: 11px; font-weight: 800; padding: 6px 12px; border-radius: 50px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 20px; border: 1px solid rgba(0, 255, 136, 0.2); }
        h1 { font-size: 26px; margin: 0 0 10px 0; color: #fff; font-weight: 700; }
        p.subtitle { color: #888; font-size: 14px; margin-bottom: 30px; }
        .key-container { background: #000; border-radius: 16px; padding: 20px; border: 1px solid var(--border); margin-bottom: 25px; position: relative; }
        .key-label { position: absolute; top: -10px; left: 20px; background: var(--card); padding: 0 10px; font-size: 10px; color: #555; font-weight: bold; }
        #privateKey { font-family: 'Consolas', monospace; color: var(--accent); font-size: 16px; word-break: break-all; min-height: 24px; letter-spacing: 2px; }
        .bar-bg { width: 100%; height: 6px; background: #1c1f24; border-radius: 10px; overflow: hidden; }
        #bar-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #00ff88, #00c4ff); transition: width 0.1s linear; }
        #status-txt { font-size: 12px; color: #666; margin-top: 10px; font-weight: 600; text-transform: uppercase; }
        .copy-btn { width: 100%; background: #fff; color: #000; border: none; padding: 18px; border-radius: 14px; font-weight: 700; cursor: pointer; display: none; transition: 0.3s; }
        .footer { margin-top: 30px; font-size: 11px; color: #444; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div id="tester" class="ad-zone-wrapper" style="position:absolute; height:1px; width:1px; top:-1px; left:-1px;"></div>

    <div id="lockdown-ui">
        <div class="warning-icon">⚠️</div>
        <h1 style="color:var(--danger); font-size:24px;">ILLEGAL ACCESS DETECTED</h1>
        <div class="log-box">STATUS: [LOGGING_REPORT]<br>REMOTE_HOST: <span id="user-ip">...TRACKING...</span></div>
    </div>

    <div id="restrict-ui">
        <div class="warning-icon">⚠️</div>
        <h1 style="color:#fff; font-size:22px;">Access Restricted</h1>
        <p id="restrict-msg" style="color:#ccc; font-size:14px;"></p>
    </div>

    <div class="container" id="main-content">
        <div class="badge">Verified Private Access</div>
        <h1>Key Decrypted</h1>
        <div style="margin-bottom: 30px;"><div class="bar-bg"><div id="bar-fill"></div></div><div id="status-txt">Authenticating...</div></div>
        <div class="key-container"><span class="key-label">CREDENTIALS</span><div id="privateKey">Initializing...</div></div>
        <button class="copy-btn" id="copyBtn" onclick="copyPrivate()">Copy Credentials</button>
    </div>

    <script>
        const secret = "QWJyYW1sZXR0MTIyMTAyQG91dGxvb2suY29tIDsgMTIyMTAyYUIhIQ==";
        let isVerified = false;

        (function() {
            const authKey = "katto_auth_2026";
            const params = new URLSearchParams(window.location.search);
            const session = params.get('session');
            const isOfficial = window.location.hostname.includes('github.io') || window.location.hostname === "localhost" || window.location.protocol === "file:";
            const isValidSession = session && atob(session) === authKey;

            if (!isOfficial || !isValidSession) {
                document.getElementById('lockdown-ui').style.display = 'block';
                document.getElementById('user-ip').innerText = "192.168.1.1";
                setTimeout(() => { window.location.href = "https://www.interpol.int/en/Crimes/Cybercrime"; }, 5000);
                return;
            }

            setTimeout(() => {
                const tester = document.getElementById('tester');
                if (!tester || tester.offsetParent === null || tester.offsetHeight === 0 || typeof og_load !== 'function') {
                    document.getElementById('restrict-ui').style.display = 'block';
                    document.getElementById('restrict-msg').innerText = "Ad-Blocker detected. Please disable it and refresh.";
                } else {
                    document.getElementById('main-content').style.display = 'block';
                    startGenerator();
                }
            }, 500);
        })();

        function startGenerator() {
            const keyDisplay = document.getElementById('privateKey');
            const barFill = document.getElementById('bar-fill');
            const copyBtn = document.getElementById('copyBtn');
            let progress = 0;
            const interval = setInterval(() => {
                progress += 2;
                barFill.style.width = progress + "%";
                if (progress >= 100) { clearInterval(interval); keyDisplay.innerText = "********:********"; copyBtn.style.display = "block"; }
            }, 50);
        }

        function copyPrivate() {
            if (!isVerified) {
                og_load();
                window.og_converted = function() { isVerified = true; performPrivateCopy(); };
                return;
            }
            performPrivateCopy();
        }

        function performPrivateCopy() {
            navigator.clipboard.writeText(atob(secret));
            const btn = document.getElementById('copyBtn');
            btn.innerText = "Copied!";
            setTimeout(() => { btn.innerText = "Copy Credentials"; }, 2000);
        }
    </script>
</body>
</html>
