<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Access Vault</title>
    <style>
        :root { --main-orange: #FF6400; --dark-bg: #0f1014; --card-bg: #1a1c22; }
        body { background-color: var(--dark-bg); color: #fff; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .dashboard { max-width: 900px; width: 100%; }
        .header { border-bottom: 2px solid var(--main-orange); margin-bottom: 30px; padding-bottom: 10px; }
        .header h1 { margin: 0; font-size: 24px; letter-spacing: 1px; }
        .header span { color: var(--main-orange); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .card { background: var(--card-bg); border-radius: 10px; padding: 15px; border: 1px solid #2d2f36; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .acc-info { font-family: monospace; background: #000; padding: 12px; margin-top: 10px; border-radius: 5px; color: #00ff88; font-size: 14px; text-align: center; word-break: break-all; }
        .copy-btn { width: 100%; background: #333; border: none; color: white; padding: 12px; margin-top: 10px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .copy-btn:hover { background: var(--main-orange); }
        .footer-box { background: #1a1c22; padding: 40px 20px; border-radius: 15px; border: 1px solid #333; text-align: center; margin-top: 50px; }
        .btn-yt { display: inline-block; background: #FF0000; color: white; padding: 15px 35px; text-decoration: none; border-radius: 5px; font-weight: bold; margin: 20px 0; box-shadow: 0 4px 15px rgba(255, 0, 0, 0.3); }
        .copyright { font-size: 12px; opacity: 0.4; margin-top: 30px; letter-spacing: 1px; }
    </style>
</head>
<body>
<div class="dashboard">
    <div class="header"><h1>PREMIUM<span>VAULT</span></h1><p style="opacity:0.6; font-size:14px;">Direct Access Keys • Obfuscation Active</p></div>
    <div class="grid" id="vault-grid"></div>
    <div class="footer-box">
        <h2 style="color:var(--main-orange);">DON'T MISS THE NEXT DROP</h2>
        <a href="https://youtube.com/@kattoflicks?si=DsGDfEHk6w1zw4yL" class="btn-yt" target="_blank">SUBSCRIBE ON YOUTUBE</a>
        <div class="copyright">© KattoFlicks • ALL RIGHTS RESERVED</div>
    </div>
</div>
<script>
    const secureData = [
        "anVhbm5ldmVzbTIwQGdtYWlsLmNvbTptYXRhMDUxMg==", "amVob3ZhaHBlZHJvMDRAZ21haWwuY29tOmpwMDQwNTA1",
        "bWFuZGkuc2F4Ynk1MTEzQGdtYWlsLmNvbTpNM2RsMGNrTTUxMTM=", "Ym9uaW5pbWF1cm8zMUBnbWFpbC5jb206TWIyMDIwKio=",

        "Z2F0b3NhbmRpYTExMUB5YW5kZXguY29tOmVnczEyMw==", "a291aHlzdWdvZUBnbWFpbC5jb206a2VsdmVuMTIzMzIx",
        "emlvbi5mb3dsZXIxQGljbG91ZC5jb206aGV5aGV5aGV5WTE=", "cmh1YW5icmFuY29jQGdtYWlsLmNvbTpyaHVhbjAxMDU=",

    const grid = document.getElementById('vault-grid');
    secureData.forEach((item, index) => {
        const card = document.createElement('div'); card.className = 'card';
        card.innerHTML = `<h3 style="margin:0; color:var(--main-orange);">Server ${String(index + 1).padStart(2, '0')}</h3>
            <div class="acc-info" id="acc${index}">********:********</div>
            <button class="copy-btn" onclick="decodeAndCopy('${item}', 'acc${index}', this)">COPY KEY</button>`;

    function decodeAndCopy(encoded, displayId, btn) {
        const decoded = atob(encoded); navigator.clipboard.writeText(decoded);
        btn.innerText = "COPIED!"; btn.style.background = "#00ff88"; btn.style.color = "#000";
        setTimeout(() => { btn.innerText = "COPY KEY"; btn.style.background = "#333"; btn.style.color = "#fff"; }, 2000);

</script>
</body>
</html>
